{% load static %}

<div id="camera-modal" class="modal">
    <div class="modal-content camera-modal-content">
        <div class="modal-header">
            <h2 class="modal-title">AR-Сканер</h2>
            <button class="close-btn" onclick="closeCameraModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="camera-container">
                <div class="camera-feed-wrapper">
                    <video id="camera-feed" class="camera-video" autoplay playsinline></video>
                    <canvas id="detection-canvas" class="camera-canvas"></canvas>
                </div>
                <div class="camera-controls">
                    <button id="toggle-camera" class="camera-btn">
                        <i class="fas fa-sync-alt"></i>
                        <span>Переключить камеру</span>
                    </button>
                    <button id="capture-btn" class="camera-btn">
                        <i class="fas fa-camera"></i>
                        <span>Сканировать</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
