{% load static %}

<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AR Chinese">
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <link rel="apple-touch-icon" href="{% static 'icons/icon-192x192.png' %}">
    <title>{% block title %}AR Chinese{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/scanner.css' %}">
    <link rel="stylesheet" href="{% static 'css/level.css' %}">
    <link rel="stylesheet" href="{% static 'css/lesson.css' %}">

    {% if words_json %}
    <script>
        window.wordsData = {{ words_json|safe }};
    </script>
    {% endif %}

    <script src="{% static 'js/home.js' %}"></script>
    <script src="{% static 'js/levels.js' %}?v=2"></script>
    <script src="{% static 'js/camera.js' %}"></script>
    <script src="{% static 'js/themes.js' %}"></script>
    <script src="{% static 'js/scan_object.js' %}"></script>
    <script src="{% static 'js/dictionary.js' %}"></script>
    <script src="{% static 'js/word.js' %}"></script>
    <script src="{% static 'js/level.js' %}?v=2"></script>
    <script src="{% static 'js/lesson.js' %}?v=2"></script>
</head>

<body>
    {% block content %}
    {% endblock %}

<script>
    // Регистрируем Service Worker для PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('{% static 'sw.js' %}')
                .then((registration) => {
                    console.log('Service Worker зарегистрирован:', registration.scope);
                })
                .catch((error) => {
                    console.log('Ошибка регистрации Service Worker:', error);
                });
        });
    }
</script>
</body>

</html>
