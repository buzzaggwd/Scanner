{% load static %}

{% block header %}
<header class="header">
    <div class="header-content">
        <nav class="top-nav">
            <a href="{% url 'home' %}" class="nav-item {% if active_page == 'home' %}active{% endif %}"
                data-tooltip="Главная">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span class="nav-text">Главная</span>
            </a>
            <a href="{% url 'dictionary' %}" class="nav-item {% if active_page == 'dictionary' %}active{% endif %}"
                data-tooltip="Словарь">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 7V4a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v3"></path>
                    <path d="M9 20h6"></path>
                    <path d="M12 4v16"></path>
                </svg>
                <span class="nav-text">Словарь</span>
            </a>
            <!--ПЕРЕВОДЧИК-->
            <!-- <a class="add-btn" onclick="openTranslateModal()" data-tooltip="Добавить слово">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </a> -->
            <!--СКАННЕР-->
            <a class="add-btn" onclick="openCameraModal()" data-tooltip="Отсканировать QR-код">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </a>
            <a href="{% url 'levels' %}" class="nav-item {% if active_page == 'levels' %}active{% endif %}"
                data-tooltip="Уровни">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 20V10"></path>
                    <path d="M12 20V4"></path>
                    <path d="M6 20v-6"></path>
                </svg>
                <span class="nav-text">Уровни</span>
            </a>
            <a href="{% url 'profile' %}" class="nav-item {% if active_page == 'profile' %}active{% endif %}"
                data-tooltip="Профиль">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span class="nav-text">Профиль</span>
            </a>
        </nav>
    </div>
</header>
{% endblock %}
