<div class="app-container">
    <aside class="sidebar desktop-only">
        <div class="logo">AR<span>Learn</span></div>
        <nav class="side-nav">
            <a href="#" class="nav-link active"><i class="fa-solid fa-house"></i> Главная</a>
            <a href="#" class="nav-link"><i class="fa-solid fa-book"></i> Словарь</a>
            <a href="#" class="nav-link"><i class="fa-solid fa-graduation-cap"></i> Уроки</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div class="user-info">
                <div class="avatar-box"></div>
                <div class="user-text">
                    <span class="greeting">Привет,</span>
                    <span class="user-name">Майя Романовна</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="icon-btn-soft"><i class="fa-solid fa-gear"></i></div>
            </div>
        </header>

        <div class="content-layout">
            <div class="primary-col">
                <div class="neu-card progress-card">
                    <div class="card-header">
                        <span class="tag">Уровень 12</span>
                        <span class="xp">1250 XP</span>
                    </div>
                    <div class="progress-track"><div class="progress-fill" style="width: 60%;"></div></div>
                    <p class="sub-text">750 XP до следующего уровня</p>
                </div>

                <div class="dashboard-grid">
                    <div class="neu-card grid-item">
                        <div class="icon-box purple"><i class="fa-solid fa-camera"></i></div>
                        <span>Сканер</span>
                    </div>
                    <div class="neu-card grid-item">
                        <div class="icon-box green"><i class="fa-solid fa-fire"></i></div>
                        <span>Челленджи</span>
                    </div>
                </div>
            </div>

            <aside class="secondary-col">
                <h3>Последние слова</h3>
                <div class="neu-card word-item">
                    <div class="mini-icon"><i class="fa-solid fa-mug-hot"></i></div>
                    <div class="word-details"><strong>Mug</strong><span>Кружка</span></div>
                    <div class="stat">98%</div>
                </div>
            </aside>
        </div>
    </main>

    <nav class="bottom-bar mobile-only">
        <i class="fa-solid fa-house active"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <div class="scan-fab"><i class="fa-solid fa-expand"></i></div>
        <i class="fa-solid fa-chart-simple"></i>
        <i class="fa-solid fa-user"></i>
    </nav>
</div>
