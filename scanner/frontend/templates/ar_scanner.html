{% load static %}

<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR_scanner</title>
    <link href="{% static 'css/main.css' %}" rel="stylesheet">
    <link href="{% static 'css/scanner.css' %}" rel="stylesheet">
</head>

<body>
    <!-- Экран «Сканер» -->
    <div id="scanner-screen" class="screen scanner-screen">
        <!-- Хедер с логотипом и навигацией -->
        <header class="header">
            <div class="header-content">
                <nav class="top-nav">
                    <a href="{% url 'home' %}" class="nav-item" data-tooltip="Главная">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span class="nav-text">Главная</span>
                    </a>
                    <a href="{% url 'dictionary' %}" class="nav-item" data-tooltip="Словарь">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 7V4a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v3"></path>
                            <path d="M9 20h6"></path>
                            <path d="M12 4v16"></path>
                        </svg>
                        <span class="nav-text">Словарь</span>
                    </a>
                    <button class="add-btn" onclick="openTranslateModal()" data-tooltip="Добавить слово">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <a href="{% url 'levels' %}" class="nav-item" data-tooltip="Уровни">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 20V10"></path>
                            <path d="M12 20V4"></path>
                            <path d="M6 20v-6"></path>
                        </svg>
                        <span class="nav-text">Уровни</span>
                    </a>
                    <a href="{% url 'profile' %}" class="nav-item" data-tooltip="Профиль">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span class="nav-text">Профиль</span>
                    </a>
                </nav>
            </div>
        </header>

        <img src="{% static 'images/background-cup.jpg' %}" alt="Чашка на столе" class="background-img blur">
        <div class="scanner-area">
            <p>Наведите камеру на иероглиф</p>
        </div>
        <div class="scanner-controls">
            <button class="flash-btn">⚡</button>
            <button class="scan-btn" onclick="scanObject()">Сканировать</button>
            <button class="pen-btn">✏️</button>
        </div>
    </div>

    <!-- Модальное окно с результатами -->
    <div id="result-modal" class="result-modal">
        <div class="result-content">
            <div id="result-word" class="result-word"></div>
            <div id="result-translation" class="result-translation"></div>
            <div id="result-xp" class="result-xp"></div>
            <button class="result-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <!-- Модальное окно для перевода -->
    <div id="translate-modal" class="translate-modal">
        <div class="translate-content">
            <h2>Добавить слово</h2>
            <textarea id="translate-input" class="translate-input"
                placeholder="Введите текст для перевода..."></textarea>
            <div id="translate-result" class="translate-result">
                <p>Результат перевода появится здесь</p>
            </div>
            <div class="translate-buttons">
                <button class="translate-btn" onclick="translateText()">Перевести</button>
                <button class="cancel-btn" onclick="closeTranslateModal()">Отмена</button>
            </div>
        </div>
    </div>

</body>

</html>
